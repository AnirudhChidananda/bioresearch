spec_version: 1
name: bioresearch
type: space
runtime: fastapi
app: server.app:app
port: 8000

tasks:
  - name: dna_classification
    description: "Classify the disease caused by a DNA mutation given pathway context"
    difficulty: easy
  - name: dna_reasoning
    description: "Identify disease and explain the biological mechanism step-by-step"
    difficulty: medium
  - name: evidence_ranking
    description: "Rank 4 candidate diseases with elimination reasoning and supporting evidence"
    difficulty: medium-hard
  - name: protein_function
    description: "Predict protein function, subcellular location, and GO terms from sequence"
    difficulty: hard
  - name: target_discovery_lab
    description: "Long-horizon tool-calling lab: pick a druggable target from a mutation brief and propose an intervention"
    difficulty: very-hard
  - name: protein_hypothesis_lab
    description: "Long-horizon tool-calling lab with gold <think> CoT traces powering a dense per-step process reward"
    difficulty: very-hard
  - name: curriculum_self_play
    description: "Self-play curriculum that progressively hides tool outputs as the agent improves"
    difficulty: adaptive
  - name: clinical_diagnosis
    description: "Rank differential diagnoses for a radiology case and commit to a final diagnosis with step-by-step reasoning"
    difficulty: medium-hard
  - name: clinical_diagnosis_lab
    description: "Long-horizon diagnostic lab with tool access and dense per-step reward from gold gptoss120b reasoning"
    difficulty: very-hard
  - name: perturbation_qa
    description: "CRISPRi world-modeling batch: does knocking down query_gene change target_gene in a given cell line?"
    difficulty: hard
  - name: ligand_design
    description: "Propose a high-pIC50 small molecule (SMILES or named drug) for a given gene, scored against top-1000 catalogue"
    difficulty: very-hard
