name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --extra dev --extra playground

      - name: Run unit and integration tests
        run: uv run pytest -q

      - name: Smoke-test gold policy baseline
        run: uv run python evaluate.py --policy gold --episodes 2 --tasks dna_classification virtual_tumor_board --output smoke.json

      - name: Upload smoke results
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results
          path: smoke.json
          if-no-files-found: warn
